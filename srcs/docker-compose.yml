services:
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    restart: always
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - alejhernet
    depends_on:
      - wordpress
      
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    restart: always
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mariadb
    networks:
      - alejhernet

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    restart: always
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - alejhernet
    depends_on:
      - mariadb

networks:
  alejhernet:
    driver: bridge

volumes:
    mariadb_data:
        driver: local
        driver_opts:
            type: none
            device: /home/alejhern/data/mariadb
            o: bind

    wordpress_data:
        driver: local
        driver_opts:
            type: none
            device: /home/alejhern/data/wordpress
            o: bind